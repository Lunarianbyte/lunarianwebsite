<!DOCTYPE html>
<html lang="id" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LunarianByte</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Bootstrap Custom -->
  <link rel="stylesheet" href="bootstrap.css" />
</head>

<body class="transition-all duration-300">

<!-- NAVBAR -->
<header class="fixed top-0 w-full z-50 backdrop-blur bg-body border-bottom">
  <div class="container d-flex justify-content-between align-items-center py-2">

    <h1 class="h5 m-0 text-success">🌙 LunarianByte</h1>

    <div class="d-flex align-items-center gap-2">

      <button id="langToggle" class="btn btn-sm btn-outline-secondary">ID</button>
      <button id="themeToggle" class="btn btn-sm btn-success">🌗</button>

      <a href="#about" class="text-decoration-none text-secondary">About</a>
      <a href="#projects" class="text-decoration-none text-secondary">Projects</a>
      <a href="#skills" class="text-decoration-none text-secondary">Skills</a>

    </div>
  </div>
</header>

<!-- HERO -->
<section class="min-vh-100 d-flex align-items-center justify-content-center text-center container">
  <div class="pt-5 mt-5">

    <h2 class="display-4 fw-bold" data-i18n="title">LunarianByte</h2>

    <p class="text-secondary mt-3" data-i18n="desc">
      Modern digital identity for elegant web experiences.
    </p>

    <div class="mt-4 d-flex justify-content-center gap-3">
      <button onclick="scrollToSection('projects')" class="btn btn-success">
        <span data-i18n="explore">Explore Projects</span>
      </button>

      <button onclick="scrollToSection('about')" class="btn btn-outline-secondary">
        <span data-i18n="learn">Learn More</span>
      </button>
    </div>

  </div>
</section>

<!-- ABOUT -->
<section id="about" class="py-5 text-center container">
  <h2 data-i18n="about">About Me</h2>
  <p class="text-secondary mx-auto" style="max-width:600px" data-i18n="aboutDesc">
    Developer focused on modern UI & backend.
  </p>
</section>

<!-- SKILLS -->
<section id="skills" class="py-5 container text-center">
  <h2 class="mb-4" data-i18n="skills">Skills</h2>

  <div class="row g-4">
    <div class="col-md-4">
      <div class="card p-3 h-100">
        <h5>Frontend</h5>
        <p class="text-secondary">HTML, CSS, JS, Tailwind</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 h-100">
        <h5>Backend</h5>
        <p class="text-secondary">Node.js, API</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="card p-3 h-100">
        <h5>Other</h5>
        <p class="text-secondary">Automation, UI Design</p>
      </div>
    </div>
  </div>
</section>

<!-- PROJECTS -->
<section id="projects" class="py-5 container text-center">
  <h2 class="mb-4" data-i18n="projects">Projects</h2>

  <select id="filter" class="form-select w-auto mx-auto mb-4">
    <option value="all">All</option>
    <option value="js">JavaScript</option>
    <option value="api">API</option>
  </select>

  <div id="repoContainer" class="row g-4"></div>
</section>

<!-- FOOTER -->
<footer class="text-center py-4 border-top">
  © 2026 LunarianByte
</footer>

<script src="script.js"></script>
</body>
</html>
